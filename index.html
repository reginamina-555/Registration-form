<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This Page</title>
</head>
<body>
    <h1><center>Registration Form</center></h1>

    <!--FullName-->
    <div class="fn">
    <label>Full Name:</label><br>
    <input type="text" id="fullName" placeholder="Enter your Name">
    <div id="fullNameError" style="color:red;"></div>
    </div>
    <br>

    <!--Email-->
    <div class="email">
        <label>Email Address:</label><br>
        <input type="text" id="email" placeholder="Enter your Email Address">
        <div id="emailError" style="color:red;"></div>
    </div>

<br>

    <!--Password-->
     <div class="ps">
        <label>Password:</label><br>
        <input type="password" id="password" placeholder="Enter your Password">
        <div id="passwordError" style="color:red;"></div>
        <input type="checkbox" onclick="togglePassword()"> Show Password
    </div>

<br>

    <!--Confirm Password-->
     <div class="cp">
        <label>Confirm Password:</label><br>
        <input type="password" id="confirmPassword" placeholder="Enter your Password">
        <div id="confirmPasswordError" style="color:red;"></div>
        <div id="passwordMatchMessage"></div>
        <input type="checkbox" onclick="toggleConfirmPassword()"> Show Password
    </div>

<br>

    <!--Age-->
     <div class="age">
        <label>Age:</label><br>
        <input type="text" id="age" placeholder="Enter your Age">
        <div id="ageError" style="color:red;"></div>
    </div>

<br>

    <!--Gender-->
    <div class="gender">
        <label>Gender:</label><br>

        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label>

        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" value="other" id="other">
        <label for="other">Other</label>

        <div id="genderError" style="color:red;"></div>
    </div>

<br>

    <!--Country-->
    <div class="form-group">
        <label for="country">Country</label>
        <select id="country">
            <option value="">Select a Country</option>
             <option value="USA">United State</option>
              <option value="UK">Canada</option>
               <option value="Philippines">Philippines</option>
                <option value="Australia">Australia</option>
                 <option value="India">India</option>
                  <option value="Japan">Japan</option>
        </select>
        <div id="countryError" style="color:red;"></div>
    </div>

<br>

    <!--Agree and Term Condition-->
    <div class="agree">
        <input type="checkbox" id="terms">
        <label for="terms" style="display: inline;">Agree to the Terms and Condition</label>
        <div id="termsError" style="color:red;"></div>
    </div>

<br>

    <div class="button">
        <button type="button" onclick="registerUser()">Register</button>
        <button type="button" onclick="clearForm()">Clear Form</button>
    </div>

<br>

<script>

// Get all values
function getFormValues(){

    let gender = "";
    if (document.getElementById("male").checked) {
        gender = "Male";
    } else if (document.getElementById("female").checked) {
        gender = "Female";
    } else if (document.getElementById("other").checked) {
        gender = "Other";
    }

    return {
        fullName: document.getElementById("fullName").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        confirmPassword: document.getElementById("confirmPassword").value,
        age: document.getElementById("age").value,
        gender: gender,
        country: document.getElementById("country").value,
        termsAccepted: document.getElementById("terms").checked
    };
}

// Validate form
function validateForm() {
    let values = getFormValues();
    let errors = [];

    // clear old errors
    document.getElementById("fullNameError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("passwordError").innerHTML = "";
    document.getElementById("confirmPasswordError").innerHTML = "";
    document.getElementById("ageError").innerHTML = "";
    document.getElementById("genderError").innerHTML = "";
    document.getElementById("countryError").innerHTML = "";
    document.getElementById("termsError").innerHTML = "";

    if (values.fullName === "") {
        document.getElementById("fullNameError").innerHTML = "Full name is required";
        errors.push("Full name is required");
    }

    if (values.email === "") {
        document.getElementById("emailError").innerHTML = "Email is required";
        errors.push("Email is required");
    }

    if (values.password === "") {
        document.getElementById("passwordError").innerHTML = "Password is required";
        errors.push("Password is required");
    }

    if (values.confirmPassword === "") {
        document.getElementById("confirmPasswordError").innerHTML = "Confirm password is required";
        errors.push("Confirm password is required");
    }

    if (values.password !== values.confirmPassword) {
        document.getElementById("confirmPasswordError").innerHTML = "Passwords do not match";
        errors.push("Passwords do not match");
    }

    if (values.age === "" || values.age <= 0) {
        document.getElementById("ageError").innerHTML = "Valid age is required";
        errors.push("Valid age is required");
    }

    if (values.gender === "") {
        document.getElementById("genderError").innerHTML = "Gender is required";
        errors.push("Gender is required");
    }

    if (values.country === "") {
        document.getElementById("countryError").innerHTML = "Country is required";
        errors.push("Country is required");
    }

    if (!values.termsAccepted) {
        document.getElementById("termsError").innerHTML = "You must accept the terms";
        errors.push("You must accept the terms");
    }

    return errors;
}

// Register
function registerUser() {
    let errors = validateForm();

    if (errors.length > 0) {
        alert("Validation Errors:\n\n - " + errors.join("\n - "));
    } else {
        let values = getFormValues();

        let registrationSummary =
            "Full Name: " + values.fullName + "\n" +
            "Email: " + values.email + "\n" +
            "Age: " + values.age + "\n" +
            "Gender: " + values.gender + "\n" +
            "Country: " + values.country;

        alert("Registration Successful!\n\n" + registrationSummary);
    }
}

// Clear
function clearForm() {

    document.getElementById("fullName").value = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    document.getElementById("confirmPassword").value = "";
    document.getElementById("age").value = "";

    document.getElementById("male").checked = false;
    document.getElementById("female").checked = false;
    document.getElementById("other").checked = false;

    document.getElementById("country").value = "";
    document.getElementById("terms").checked = false;

    document.getElementById("fullNameError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("passwordError").innerHTML = "";
    document.getElementById("confirmPasswordError").innerHTML = "";
    document.getElementById("ageError").innerHTML = "";
    document.getElementById("genderError").innerHTML = "";
    document.getElementById("countryError").innerHTML = "";
    document.getElementById("termsError").innerHTML = "";
    document.getElementById("passwordMatchMessage").innerHTML = "";

    alert("✓ Form has been cleared!");
}

// Password match checker
function checkPasswordMatch() {

    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let messageDiv = document.getElementById("passwordMatchMessage");

    if (confirmPassword === "") {
        messageDiv.innerHTML = "";
    }
    else if (password === confirmPassword) {
        messageDiv.innerHTML = "✓ Passwords match";
        messageDiv.style.color = "green";
    }
    else {
        messageDiv.innerHTML = "✗ Passwords do not match";
        messageDiv.style.color = "red";
    }
}

// Show/Hide password
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    let pass = document.getElementById("confirmPassword");
    pass.type = pass.type === "password" ? "text" : "password";
}

document.getElementById("password").addEventListener("keyup", checkPasswordMatch);
document.getElementById("confirmPassword").addEventListener("keyup", checkPasswordMatch);

</script>

</body>
</html>
